# ---- entity ----
entity:
  input_select:
    battmind_select_release:
      name: "Wybierz wersję Battmind"
      description: "Wybierz wersję do aktualizacji"

  input_button:
    enforce_planning:
      name: "Wymuś planowanie"
      description: "Przelicz plan ładowania"
    restart_script:
      name: "Uruchom ponownie skrypt"
      description: "Restart skryptu"

  input_boolean:
    debug_log:
      name: "{name}.py log debugowania"
      description: "{name}.py log debugowania"
    deactivate_script:
      name: "Dezaktywuj skrypt"
      description: "Skrypt wyłączony – ładowarka i pojazd nie są sterowane"
    cheapest_hour_fill_planner:
      name: "Ładowanie: Najtańsze okresy"
      description: "Włącz, aby ładować w najtańszych okresach"

    most_expensive_planner:
      name: "Ładowanie: Najdroższe okresy"
      description: "Włącz, aby ładować w najdroższych okresach i maksymalizować zwrot"

    only_discharge_on_profit:
      name: "Rozładowanie: Tylko przy zysku"
      description: "Włącz, aby rozładowywać tylko gdy jest to opłacalne"

    prioritize_discharge_hours_by_energy_cost:
      name: "Rozładowanie: Priorytet wg kosztu energii"
      description: "Włącz, aby priorytetyzować godziny rozładowania według kosztu energii zamiast ceny"

    sell_excess_kwh_available:
      name: "Rozładowanie: Sprzedaj nadwyżkę kWh"
      description: "Włącz, aby sprzedawać nadwyżkę energii do sieci w najdroższych godzinach"

  input_number:
    kwh_charged_by_solar:
      name: "kWh naładowane z PV"
      description: "Energia naładowana z paneli słonecznych"
    solar_sell_fixed_price:
      name: "Stała cena sprzedaży energii"
      description: "Stała cena sprzedaży energii z PV; -1.0 oznacza cenę godzinową"
      unit_of_measurement: "zł/kWh"
    cheap_price_periods:
      name: "Tanie okresy cenowe"
      description: "Maksymalna liczba tanich okresów do zaplanowania"

    cheapest_price_rise_threshold:
      name: "Wzrost dla najniższej ceny"
      description: "Wzrost ceny używany do zdefiniowania najniższej ceny"
      unit_of_measurement: "zł/kWh"

    cheap_price_period_rise_threshold:
      name: "Wzrost dla tanich okresów"
      description: "Wzrost ceny używany do zdefiniowania tanich okresów względem najniższej ceny"
      unit_of_measurement: "zł/kWh"

    min_profit_per_kwh:
      name: "Min. zysk na kWh przy rozładowaniu"
      description: "Minimalny zysk na kWh wymagany do rozładowania"
      unit_of_measurement: "zł/kWh"

  # ---- input_text ----
  input_text:
    exclude_sell_hours:
      name: "Wyklucz godziny sprzedaży"
      description: "Lista godzin (0-23) oddzielonych przecinkami, które mają być wykluczone ze sprzedaży nadwyżki energii do sieci"

