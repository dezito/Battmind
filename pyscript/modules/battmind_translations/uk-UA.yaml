# ---- entity ----
entity:
  input_select:
    battmind_select_release:
      name: "Вибрати версію Battmind"
      description: "Виберіть версію для оновлення"

  input_button:
    enforce_planning:
      name: "Примусове планування"
      description: "Перерахувати план заряджання"
    restart_script:
      name: "Перезапустити скрипт"
      description: "Перезапуск скрипта"

  input_boolean:
    debug_log:
      name: "{name}.py журнал налагодження"
      description: "{name}.py журнал налагодження"
    deactivate_script:
      name: "Деактивувати скрипт"
      description: "Скрипт вимкнено – зарядний пристрій і авто більше не керуються"
    cheapest_hour_fill_planner:
      name: "Заряджання: Найдешевші періоди"
      description: "Увімкніть для заряджання в найдешевші періоди"

    most_expensive_planner:
      name: "Заряджання: Найдорожчі періоди"
      description: "Увімкніть для заряджання в найдорожчі періоди для максимізації компенсації"

    only_discharge_on_profit:
      name: "Розряджання: Лише при прибутку"
      description: "Увімкніть, щоб розряджати лише коли це прибутково"

    prioritize_discharge_hours_by_energy_cost:
      name: "Розряджання: Пріоритет за вартістю енергії"
      description: "Увімкніть, щоб пріоритезувати години розряджання за вартістю енергії, а не за ціною"

    sell_excess_kwh_available:
      name: "Розряджання: Продати надлишкові кВт·год"
      description: "Увімкніть, щоб продавати надлишкову енергію в мережу в найдорожчі години"

  input_number:
    kwh_charged_by_solar:
      name: "кВт·год заряджено від сонця"
      description: "Енергія, заряджена від сонячних панелей"
    solar_sell_fixed_price:
      name: "Фіксована ціна продажу сонячної енергії"
      description: "Фіксована ціна для розрахунку надлишку; -1.0 означає погодинну ціну"
      unit_of_measurement: "₴/кВт·год"
    cheap_price_periods:
      name: "Дешеві цінові періоди"
      description: "Максимальна кількість дешевих періодів для планування"

    cheapest_price_rise_threshold:
      name: "Зростання для найнижчої ціни"
      description: "Зростання ціни для визначення найнижчої ціни"
      unit_of_measurement: "₴/кВт·год"

    cheap_price_period_rise_threshold:
      name: "Зростання для дешевих періодів"
      description: "Зростання ціни для визначення дешевих періодів на основі найнижчої ціни"
      unit_of_measurement: "₴/кВт·год"

    min_profit_per_kwh:
      name: "Мін. прибуток за кВт·год при розряджанні"
      description: "Мінімальний прибуток за кВт·год для дозволу розряджання"
      unit_of_measurement: "₴/кВт·год"

  # ---- input_text ----
  input_text:
    exclude_sell_hours:
      name: "Виключити години продажу"
      description: "Список годин (0-23), розділений комами, які потрібно виключити з продажу надлишкової енергії в мережу"

  sensor:
