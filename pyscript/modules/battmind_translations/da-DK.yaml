# ---- entity ----
entity:
  # ---- input_select ----
  input_select:
    battmind_select_release:
      name: "Vælg BattMind udgivelse"
      description: "Vælg den udgivelse at opgradere til"

  # ---- input_button ----
  input_button:
    enforce_planning:
      name: "Gennemtving planlægning"
      description: "Genberegn ladeplan"
    restart_script:
      name: "Genstart scriptet"
      description: "Genstart scriptet"

  # ---- input_boolean ----
  input_boolean:
    debug_log:
      name: "{name}.py debug log"
      description: "{name}.py debug log"
    deactivate_script:
      name: "Deaktiver scriptet"
      description: "Deaktiver scriptet, laderen og bilen styres ikke mere"
    cheapest_hour_fill_planner:
      name: "Ladning: Billigste perioder planlægger"
      description: "Aktiver denne for at lade i de billigste perioder"
    most_expensive_planner:
      name: "Ladning: Dyreste perioder planlægger"
      description: "Aktiver denne for at lade til de dyreste perioder, for at maksimere refusion"
    only_discharge_on_profit:
      name: "Afladning: Kun ved profit"
      description: "Aktiver denne for kun at aflade når det er profitabelt"
    prioritize_discharge_hours_by_energy_cost:
      name: "Afladning: Prioriter efter energikost"
      description: "Aktiver denne for at prioritere afladningstimer baseret på energikost i stedet for pris"
    sell_excess_kwh_available:
      name: "Afladning: Sælg overskydende kWh tilgængelig"
      description: "Aktiver denne for at sælge overskydende kWh til nettet i de dyreste timer"

  # ---- input_number ----
  input_number:
    kwh_charged_by_solar:
      name: "kWh ladet af solcellerne"
      description: "kWh opladet af solcellerne"
    solar_sell_fixed_price:
      name: "Solcelle fast salgspris"
      description:
        "Fast salgspris for solceller, bruges til at beregne solcelleoverskud,
        sæt til -1.0 for at bruge timepris"
