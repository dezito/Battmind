    cheap_price_periods:
      name: "Billige prisperioder"
      description: "Maks antal billige prisperioder at planlægge for"
    cheapest_price_rise_threshold:
      name: "Stigning for billigste pris"
      description: "Stigning i pris for at definere den billigste pris"
      unit_of_measurement: kr/kWh
    cheap_price_period_rise_threshold:
      name: "Stigning for billige prisperioder"
      description: "Stigning i pris for at definere billige prisperioder, udfra den billigste pris"
