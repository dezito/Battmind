_meta:
  lang: en-GB
  project: Battmind
  version: seed-1

app:
  title: "Battmind"

# ---- charging_type ----
charging_type:
  error:
    description: "Critical error, emergency charging"
  no_rule:
    description: "Charging without rule"
  cheapest_hour_fill_planner:
    description: "Charging during the cheapest periods"
  most_expensive_planner:
    description: "Prioritise charging for the most expensive periods"
  needed_before_max_level_planner:
    description: "Charging during required periods before the maximum battery level is reached"
  charging:
    description: "Charging"
  discharging:
    description: "Discharging"
  balance:
    description: "Charge and discharge balance"
  solar:
    description: "Solar charging / excess production"
  solar_corrected:
    description: "Maximum charge reached – solar surplus"
  powerwall:
    description: "Charging from home battery"
  powerwall_avg_symbol:
    description: "Average home battery charging"
  sunrise:
    description: "Sunrise"
  sunset:
    description: "Sunset"
  charging_problem:
    description: "Charging issues"
  charging_error:
    description: "Charging failed completely"
  blocked:
    description: "Charging blocked"
  profit:
    description: "Savings and revenue from discharging"
  average:
    description: "Average consumption"

# ---- config ----
config:
  first_run: "**Required** After editing the file this must be set to false"
  cron_interval: "**Required** Interval between status checks and function runs"

  database:
    power_values_db_data_to_save: "Number of days of power values to store"
    solar_available_db_data_to_save: "Amount stored per cloud coverage density"
    kwh_avg_prices_db_data_to_save: "Amount stored"
    drive_efficiency_db_data_to_save: "Amount stored"
    km_kwh_efficiency_db_data_to_save: "Amount stored"
    charging_history_db_data_to_save: "Store X months of history"

  forecast:
    entity_ids:
      hourly_service_entity_id: "**Required when using solar** Hourly forecast entity_id"
      daily_service_entity_id: "**Required when using solar** Daily forecast entity_id"
      outdoor_temp_entity_id: "Used for more accurate preheating/defrosting temperature than forecast"

  home:
    entity_ids:
      power_consumption_entity_id: "Home consumption (watt entity), not grid consumption"
      powerwall_watt_flow_entity_id: "Home battery watt flow (positive when discharging, negative when charging; invert via home.invert_powerwall_watt_flow_entity_id). Tip: Disable Powerwall discharge when the car is charging"
      powerwall_battery_level_entity_id: "Home battery level (percentage)"
      ignore_consumption_from_entity_ids: "List of power sensors to ignore"
    power_consumption_entity_id_include_powerwall_charging: "Home consumption incl. battery charging (watt entity)"
    power_consumption_entity_id_include_powerwall_discharging: "Home consumption incl. battery discharging (watt entity)"
    invert_powerwall_watt_flow_entity_id: "Invert sign for home.entity_ids.powerwall_watt_flow_entity_id so charging is positive and discharging negative"

  notification:
    efficiency_on_cable_plug_in: "Notification of latest driving efficiency when cable is connected"
    update_available: "Notification at midnight and at script start if a new version is available"
    preheating: "Notification when preheating starts/stops"
  notify_list: "List of users to receive notifications"

  prices:
    entity_ids:
      power_prices_entity_id: "**Required** Energi Data Service price entity_id"
    cheap_price_periods: "Maximum number of cheap price periods to plan for"
    cheapest_price_rise_threshold: "Price increase used to define the cheapest price"
    cheap_price_period_rise_threshold: "Price increase used to define cheap periods based on the cheapest price"
    refund: "Refund amount from state/provider"

  solar:
    entity_ids:
      production_entity_id: "Solar production (watt)"
      forecast_entity_id: "Solar forecast (watt) (Supported integration: Solcast PV Forecast)"
    solarpower_use_before_minutes: "Number of minutes you can 'borrow' against solar overproduction"
    powerwall_battery_level_max: "Maximum battery level in percent"
    powerwall_battery_level_min: "Minimum battery level in percent"
    powerwall_charge_discharge_loss: "Charge/discharge loss percentage based on battery round-trip efficiency (e.g. 10% loss = 0.1)"
    use_charge_discharge_loss_from_history: "Use actual charge and discharge losses based on charging history instead of the estimated loss in the config"
    powerwall_wear_cost_per_kwh: "Cost per kWh used from the home battery based on lifetime and price"
    production_price: "Set to -1.0 to use raw hourly sell price; can also be changed via WebGUI"
    powerwall_battery_size: "Home battery size (kWh)"
    inverter_discharging_power_limit: "Inverter discharge power limit (watt)"
    powerwall_charging_power_limit: "Home battery charging power limit (watt)"
    powerwall_discharging_power: "Home battery discharge power (watt)"

# ---- entity ----
entity:
  input_select:
    battmind_select_release:
      name: "Select Battmind release"
      description: "Choose the release to upgrade to"

  input_button:
    enforce_planning:
      name: "Force planning"
      description: "Recalculate charging plan"
    restart_script:
      name: "Restart script"
      description: "Restart the script"

  input_boolean:
    debug_log:
      name: "{name}.py debug log"
      description: "{name}.py debug log"
    solar_charging:
      name: "Solar surplus charging"
      description: "Use surplus production; plan weekly from forecast"
    deactivate_script:
      name: "Deactivate script"
      description: "Deactivate the script, charger and car are no longer controlled"
    cheapest_hour_fill_planner:
      name: "Charging: Cheapest periods planner"
      description: "Enable to charge during the cheapest periods"
    cheapest_hour_fill_up:
      name: "Charging: Fill up during cheapest period"
      description: "Enable this to charge to maximum battery level during the cheapest period, otherwise only charge what is needed"
    most_expensive_planner:
      name: "Charging: Most expensive periods planner"
      description: "Enable to charge during the most expensive periods to maximise refund"
    needed_before_max_level_planner:
      name: "Charging: Required before max level planner"
      description: "Enable this to charge during required periods before the maximum battery level is reached"
    only_discharge_on_profit:
      name: "Discharging: Profit only"
      description: "Enable to discharge only when profitable"
    prioritize_discharge_hours_by_energy_cost:
      name: "Discharging: Prioritise by energy cost"
      description: "Enable to prioritise discharge hours based on energy cost instead of price"
    sell_excess_kwh_available:
      name: "Discharging: Sell excess kWh"
      description: "Enable to sell excess kWh to the grid during the most expensive hours"
    use_midnight_battery_level:
      name: "Use midnight battery level"
      description: "Enable this to use the battery level at midnight for 'Sell excess kWh available', instead of the next day's lowest battery level before charging"

  input_number:
    kwh_charged_by_solar:
      name: "kWh charged by solar"
      description: "kWh charged by solar panels"
    solar_sell_fixed_price:
      name: "Fixed solar sell price"
      description: "Fixed solar sell price used to calculate surplus, set to -1.0 to use hourly price"
      unit_of_measurement: "£/kWh"
    cheap_price_periods:
      name: "Cheap price periods"
      description: "Maximum number of cheap price periods to plan for"

    cheapest_price_rise_threshold:
      name: "Increase for cheapest price"
      description: "Price increase used to define the cheapest price"
      unit_of_measurement: "£/kWh"

    cheap_price_period_rise_threshold:
      name: "Increase for cheap periods"
      description: "Price increase used to define cheap price periods based on the cheapest price"
      unit_of_measurement: "£/kWh"

    min_profit_per_kwh:
      name: "Min. profit per kWh when discharging"
      description: "Minimum profit per kWh required to allow discharging"
      unit_of_measurement: "£/kWh"

  # ---- input_text ----
  input_text:
    exclude_sell_hours:
      name: "Exclude selling hours"
      description: "Comma-separated list of hours (0-23) to exclude from selling excess kWh to the grid"

  sensor:
    current_charging_rule:
      name: "Current charging rule"
    emoji_description:
      name: "Emoji explanation"
    overview:
      name: "Overview"
    charging_history:
      name: "Charging history"
    powerwall_action:
      name: "Powerwall action"

# ---- ui ----
ui:
  common:
    valuta: "£"
    valuta_kwh: "£/kWh"
    valuta_percentage: "£/%"
    time: "Time"
    price: "Price"
    total: "Total"
    expense: "Cost"
    reason: "Reason"

  tasks:
    closing_progress: "Closing ongoing tasks"
    closed_done: "All tasks have been completed"
    not_all_closed: "Some tasks could not be completed"

  recreate_hardlinks:
    success: "Hard links successfully recreated"
