    cheap_price_periods:
      name: "Günstige Preiszeiträume"
      description: "Maximale Anzahl günstiger Zeiträume zur Planung"

    cheapest_price_rise_threshold:
      name: "Anstieg für niedrigsten Preis"
      description: "Preissteigerung zur Definition des niedrigsten Preises"
      unit_of_measurement: "€/kWh"

    cheap_price_period_rise_threshold:
      name: "Anstieg für günstige Zeiträume"
      description: "Preissteigerung zur Definition günstiger Zeiträume basierend auf dem niedrigsten Preis"
      unit_of_measurement: "€/kWh"

