# ---- entity ----
entity:
  input_select:
    battmind_select_release:
      name: "Battmind-Version auswählen"
      description: "Version zum Upgrade auswählen"

  input_button:
    enforce_planning:
      name: "Planung erzwingen"
      description: "Ladeplan neu berechnen"
    restart_script:
      name: "Skript neu starten"
      description: "Skript neu starten"

  input_boolean:
    debug_log:
      name: "{name}.py Debug-Log"
      description: "{name}.py Debug-Log"
    deactivate_script:
      name: "Skript deaktivieren"
      description: "Skript deaktivieren; Ladegerät und Fahrzeug werden nicht mehr gesteuert"
    cheapest_hour_fill_planner:
      name: "Laden: Günstigste Zeiträume"
      description: "Aktivieren, um in den günstigsten Zeiträumen zu laden"

    most_expensive_planner:
      name: "Laden: Teuerste Zeiträume"
      description: "Aktivieren, um in den teuersten Zeiträumen zu laden und die Rückerstattung zu maximieren"

    only_discharge_on_profit:
      name: "Entladen: Nur bei Gewinn"
      description: "Aktivieren, um nur zu entladen, wenn es profitabel ist"

    prioritize_discharge_hours_by_energy_cost:
      name: "Entladen: Nach Energiekosten priorisieren"
      description: "Aktivieren, um Entladezeiten nach Energiekosten statt nach Preis zu priorisieren"

    sell_excess_kwh_available:
      name: "Entladen: Überschüssige kWh verkaufen"
      description: "Aktivieren, um überschüssige Energie in den teuersten Stunden ins Netz zu verkaufen"

  input_number:
